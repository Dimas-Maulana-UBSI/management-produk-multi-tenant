name: Run Tests

on:
  push:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: management_produk_test
        options: >-
          --health-cmd="mysqladmin ping -u root -ptest_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.3'
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run tests
      run: go test ./...
      env:
        DB_HOST: localhost
        DB_PORT: 3306
        DB_NAME: management_produk_test
        DB_USER: root
        DB_PASSWORD: test_password